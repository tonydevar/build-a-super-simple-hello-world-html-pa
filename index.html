<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    /* ── 1. Custom properties ───────────────────────────────────────── */
    :root {
      --card-bg:     rgba(255, 255, 255, 0.15);
      --card-border: rgba(255, 255, 255, 0.30);
      --card-shadow: rgba(0, 0, 0, 0.20);
      --btn-bg:      rgba(255, 255, 255, 0.20);
      --btn-hover:   rgba(255, 255, 255, 0.35);
      --btn-active:  rgba(255, 255, 255, 0.45);
      --text-color:  #ffffff;
      --transition:  0.6s ease;
    }

    /* ── 2. Reset / base ────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── 3. Body / scene layout ─────────────────────────────────────── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      transition: background var(--transition);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* ── 4. Glassmorphism card ──────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px var(--card-shadow);
      padding: 40px 60px;
      text-align: center;
      animation: fadeIn 0.4s ease both;
    }

    /* ── 5. Typography ──────────────────────────────────────────────── */
    .card h1 {
      font-size: 3rem;
      font-weight: 700;
      color: var(--text-color);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }

    /* ── 6. Button ──────────────────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--btn-bg);
      color: var(--text-color);
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border: 1px solid var(--card-border);
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s ease, transform 0.15s ease,
                  box-shadow 0.2s ease;
      min-height: 44px; /* touch-friendly */
    }

    .btn:hover {
      background: var(--btn-hover);
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .btn:active {
      background: var(--btn-active);
      transform: scale(0.98);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.8);
      outline-offset: 3px;
    }

    /* ── 7. Entry animation ─────────────────────────────────────────── */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── 8. Responsive ──────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card {
        padding: 28px 32px;
        margin: 0 16px;
      }

      .card h1 {
        font-size: 2rem;
        margin-bottom: 24px;
      }

      .btn {
        padding: 12px 24px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World</h1>
    <button class="btn" id="bg-btn">Change Background</button>
  </div>

  <script>
    const GRADIENTS = [
      'linear-gradient(135deg, #667eea, #764ba2)',
      'linear-gradient(135deg, #f093fb, #f5576c)',
      'linear-gradient(135deg, #4facfe, #00f2fe)',
      'linear-gradient(135deg, #43e97b, #38f9d7)',
      'linear-gradient(135deg, #fa709a, #fee140)',
      'linear-gradient(135deg, #a18cd1, #fbc2eb)',
    ];

    let idx = 0;

    function nextBg() {
      idx = (idx + 1) % GRADIENTS.length;
      document.body.style.background = GRADIENTS[idx];
    }

    document.getElementById('bg-btn').addEventListener('click', nextBg);
  </script>
</body>
</html>
